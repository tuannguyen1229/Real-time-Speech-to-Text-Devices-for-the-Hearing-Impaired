<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Manager - Mắt Kính Hỗ Trợ Giao Tiếp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container {
            padding-top: 2rem;
        }
        
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: none;
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 0 !important;
            padding: 1.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: bold;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: bold;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: bold;
        }
        
        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px;
            font-size: 16px;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .device-item {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
            transition: transform 0.2s;
        }
        
        .device-item:hover {
            transform: translateY(-2px);
        }
        
        .status-online {
            color: #28a745;
            font-weight: bold;
        }
        
        .status-offline {
            color: #dc3545;
            font-weight: bold;
        }
        
        .api-status {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .alert {
            border-radius: 10px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card">
                    <div class="card-header text-center">
                        <h1><i class="fas fa-wifi"></i> WiFi Manager</h1>
                        <p class="mb-0">Quản lý WiFi từ xa cho thiết bị ESP32</p>
                    </div>
                    
                    <div class="card-body">
                        <!-- API Status -->
                        <div class="api-status">
                            <strong><i class="fas fa-server"></i> Trạng thái API:</strong>
                            <span id="apiStatus">Đang kiểm tra...</span>
                        </div>
                        
                        <!-- Update WiFi Config Section -->
                        <div class="row">
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header">
                                        <h5><i class="fas fa-cog"></i> Cập nhật cấu hình WiFi</h5>
                                    </div>
                                    <div class="card-body">
                                        <form id="wifiUpdateForm">
                                            <div class="mb-3">
                                                <label for="deviceId" class="form-label">Device ID:</label>
                                                <input type="text" class="form-control" id="deviceId" name="deviceId" 
                                                       placeholder="ESP32_XXXXXXXXXXXX" required>
                                            </div>
                                            
                                            <div class="mb-3">
                                                <label for="wifiName" class="form-label">Tên WiFi mới:</label>
                                                <input type="text" class="form-control" id="wifiName" name="wifiName" 
                                                       placeholder="Nhập tên WiFi" required>
                                            </div>
                                            
                                            <div class="mb-3">
                                                <label for="wifiPassword" class="form-label">Mật khẩu WiFi:</label>
                                                <input type="password" class="form-control" id="wifiPassword" name="wifiPassword" 
                                                       placeholder="Nhập mật khẩu WiFi">
                                            </div>
                                            
                                            <div class="d-grid gap-2">
                                                <button type="submit" class="btn btn-success">
                                                    <i class="fas fa-wifi"></i> Cập nhật WiFi
                                                </button>
                                                <button type="button" onclick="resetDeviceConfig()" class="btn btn-danger">
                                                    <i class="fas fa-redo"></i> Reset cấu hình
                                                </button>
                                            </div>
                                        </form>
                                        
                                        <div id="updateStatus" class="mt-3"></div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Device List Section -->
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header d-flex justify-content-between align-items-center">
                                        <h5><i class="fas fa-mobile-alt"></i> Danh sách thiết bị</h5>
                                        <button onclick="loadDeviceConfigs()" class="btn btn-primary btn-sm">
                                            <i class="fas fa-sync-alt"></i> Tải lại
                                        </button>
                                    </div>
                                    <div class="card-body">
                                        <div id="deviceList">
                                            <div class="loading">
                                                <i class="fas fa-spinner fa-spin"></i> Đang tải danh sách thiết bị...
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Navigation -->
                        <div class="text-center mt-4">
                            <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
                                <i class="fas fa-arrow-left"></i> Quay lại Dashboard
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check API status on load
        window.onload = function() {
            checkApiStatus();
            loadDeviceConfigs();
        };
        
        function checkApiStatus() {
            document.getElementById('apiStatus').innerHTML = 
                '<span class="text-success"><i class="fas fa-check-circle"></i> Online - Integrated with Web Portal</span>';
        }
        
        // Update WiFi Config
        document.getElementById('wifiUpdateForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const deviceId = document.getElementById('deviceId').value;
            const wifiName = document.getElementById('wifiName').value;
            const wifiPassword = document.getElementById('wifiPassword').value;
            
            const statusDiv = document.getElementById('updateStatus');
            statusDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> Đang cập nhật cấu hình WiFi...</div>';
            
            try {
                const response = await fetch('/api/wifi/update-config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        device_id: deviceId,
                        wifi_name: wifiName,
                        wifi_password: wifiPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusDiv.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle"></i> ${data.message}<br><small class="text-muted">ESP32 sẽ tự động cập nhật WiFi trong vòng 30 giây.</small></div>`;
                    // Reload device list
                    setTimeout(loadDeviceConfigs, 1000);
                } else {
                    statusDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> ${data.message}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> Lỗi kết nối: ${error.message}</div>`;
            }
        });
        
        // Reset Device Config
        async function resetDeviceConfig() {
            const deviceId = document.getElementById('deviceId').value;
            
            if (!deviceId) {
                alert('Vui lòng nhập Device ID');
                return;
            }
            
            if (!confirm(`Bạn có chắc muốn reset cấu hình WiFi cho ${deviceId}?`)) {
                return;
            }
            
            const statusDiv = document.getElementById('updateStatus');
            statusDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> Đang reset cấu hình...</div>';
            
            try {
                const response = await fetch(`/api/wifi/reset-config/${deviceId}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusDiv.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle"></i> ${data.message}<br><small class="text-muted">ESP32 sẽ tự động khởi động lại trong vòng 30 giây.</small></div>`;
                    // Clear form
                    document.getElementById('wifiName').value = '';
                    document.getElementById('wifiPassword').value = '';
                    // Reload device list
                    setTimeout(loadDeviceConfigs, 1000);
                } else {
                    statusDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> ${data.message}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> Lỗi kết nối: ${error.message}</div>`;
            }
        }
        
        // Load Device Configs
        async function loadDeviceConfigs() {
            const deviceList = document.getElementById('deviceList');
            deviceList.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Đang tải danh sách thiết bị...</div>';
            
            try {
                const response = await fetch('/api/wifi/list-configs');
                const data = await response.json();
                
                if (data.success) {
                    if (data.total === 0) {
                        deviceList.innerHTML = '<div class="text-center text-muted">Chưa có thiết bị nào được cấu hình</div>';
                        return;
                    }
                    
                    let html = '';
                    for (const [deviceId, config] of Object.entries(data.configs)) {
                        const statusClass = config.status === 'online' ? 'status-online' : 'status-offline';
                        const statusIcon = config.status === 'online' ? 'fas fa-circle' : 'far fa-circle';
                        const configStatus = config.wifi_name ? 
                            `<small class="text-muted">WiFi: ${config.wifi_name}</small>` : 
                            '<small class="text-warning">Chưa cấu hình WiFi</small>';
                        
                        html += `
                            <div class="device-item">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <h6 class="mb-1"><i class="fas fa-mobile-alt"></i> ${config.device_name}</h6>
                                        <small class="text-muted">ID: ${deviceId}</small><br>
                                        ${configStatus}<br>
                                        <span class="${statusClass}">
                                            <i class="${statusIcon}"></i> ${config.status === 'online' ? 'Trực tuyến' : 'Ngoại tuyến'}
                                        </span>
                                    </div>
                                    <div>
                                        <button onclick="fillDeviceForm('${deviceId}', '${config.wifi_name}')" 
                                                class="btn btn-primary btn-sm me-1">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button onclick="resetSpecificDevice('${deviceId}')" 
                                                class="btn btn-danger btn-sm">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    deviceList.innerHTML = html;
                } else {
                    deviceList.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> ${data.message}</div>`;
                }
            } catch (error) {
                deviceList.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> Lỗi kết nối: ${error.message}</div>`;
            }
        }
        
        // Fill form with device data
        function fillDeviceForm(deviceId, wifiName) {
            document.getElementById('deviceId').value = deviceId;
            document.getElementById('wifiName').value = wifiName || '';
            document.getElementById('wifiPassword').value = '';
            document.getElementById('wifiPassword').focus();
        }
        
        // Reset specific device
        async function resetSpecificDevice(deviceId) {
            if (!confirm(`Bạn có chắc muốn xóa cấu hình WiFi cho ${deviceId}?`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/wifi/reset-config/${deviceId}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`✅ ${data.message}`);
                    loadDeviceConfigs();
                } else {
                    alert(`❌ ${data.message}`);
                }
            } catch (error) {
                alert(`❌ Lỗi kết nối: ${error.message}`);
            }
        }
    </script>
</body>
</html>
